# =============================================================================
# Vision Studio - Electron Builder Configuration
# =============================================================================
# This configuration file is used by electron-builder to package the app.
# EV Code Signing is configured under the 'win' section.
#
# For more info: https://www.electron.build/configuration/configuration
# =============================================================================

appId: com.vision-studio-x.app
productName: Vision Studio
copyright: Copyright © 2024 Vision Studio Team

directories:
  output: release
  buildResources: build

# Heavy-by-design: every distributable ships the native PyInstaller backend
# (PyTorch, diffusers, CUDA). Packaging aborts if the bundle is missing -
# slim/frontend-only installers are never produced.
beforePack: scripts/assert-native-backend.cjs

# Files to include in the build
files:
  - dist/**/*
  - dist-electron/**/*
  # Exclude Python cache and backend build artifacts
  - '!backend/**/*'
  - '!resources/**/*'
  - '!**/*.pyc'
  - '!**/*.pyo'
  - '!**/*.pyd'

# Extra resources to copy into the app
extraResources:
  - from: resources/
    to: .
    filter:
      - '**/*'
  # Spec 2026-07-06 §7: every installer carries the generated third-party
  # license/attribution compliance doc as a plain file (the About screen
  # renders the same content from the renderer bundle).
  - from: THIRD-PARTY-LICENSES.md
    to: THIRD-PARTY-LICENSES.md
  - from: backend/
    to: backend-source/
    filter:
      - '**/*'
      - '!venv/**/*'
      - '!build/**/*'
      - '!dist/**/*'
      - '!__pycache__/**/*'
      - '!*.pyc'

# =============================================================================
# Windows Configuration
# =============================================================================
win:
  # Target formats: NSIS installer + portable ZIP
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64

  # App icon
  icon: build/icon.ico

  # Publisher name (must match certificate subject)
  publisherName: Vision Studio Team

  # Verify code signature on updates. Release builds must be signed.
  verifyUpdateCodeSignature: true

  # Run as current user (admin not needed for normal operation)
  requestedExecutionLevel: asInvoker

  # Release signing is enforced by scripts/verify-release-signing.cjs.
  # Use `npm run package:win:signed` for production artifacts.
  # Local unsigned development packaging can still use `npm run package:win`.

# NSIS Installer Configuration
nsis:
  # Create desktop shortcut
  createDesktopShortcut: always
  # Create start menu shortcut
  createStartMenuShortcut: true
  # Allow users to change installation directory
  allowToChangeInstallationDirectory: true
  # One-click installer (set to false for per-machine/per-user choice)
  oneClick: false
  # Per-machine installation (requires admin)
  perMachine: true
  # Include custom NSIS hooks
  include: installer.nsh

# =============================================================================
# macOS Configuration
# =============================================================================
mac:
  category: public.app-category.video
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

# =============================================================================
# Linux Configuration
# =============================================================================
linux:
  target:
    - AppImage
    - deb
    - rpm
  category: AudioVideo
  icon: build/icons
  maintainer: Vision Studio Team
  vendor: Vision Studio Team
  synopsis: AI Image & Video Generation
  description: Professional AI-powered image and video generation desktop application

# =============================================================================
# Auto-Update Feed (Cloudflare R2, generic provider)
# =============================================================================
# GitHub caps release assets at 2 GB - the heavy installer cannot ship there.
# latest.yml + installer + blockmap are published to R2 (scripts/publish-r2.cjs,
# binaries first, feed last) behind the updates.vision-studio-x.com custom domain.
# R2/S3 serve a single range per request, so multi-range differential
# downloads must be disabled or blockmap updates fail. Auto-update installs
# only signed builds (win.verifyUpdateCodeSignature) - see docs/R2-DELIVERY.md
# for the signing prerequisite before the feed goes live.
publish:
  provider: generic
  url: https://updates.vision-studio-x.com/win/
  useMultipleRangeRequest: false
