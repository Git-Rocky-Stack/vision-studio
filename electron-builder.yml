# =============================================================================
# Vision Studio - Electron Builder Configuration
# =============================================================================
# This configuration file is used by electron-builder to package the app.
# EV Code Signing is configured under the 'win' section.
#
# For more info: https://www.electron.build/configuration/configuration
# =============================================================================

appId: com.vision-studio-x.app
productName: Vision Studio
copyright: Copyright © 2024 Vision Studio Team

directories:
  output: release
  buildResources: build

# Heavy-by-design: every distributable ships the native PyInstaller backend
# (PyTorch, diffusers, CUDA). Packaging aborts if the bundle is missing -
# slim/frontend-only installers are never produced.
beforePack: scripts/assert-native-backend.cjs

# Files to include in the build
files:
  - dist/**/*
  - dist-electron/**/*
  # Exclude Python cache and backend build artifacts
  - '!backend/**/*'
  - '!resources/**/*'
  - '!**/*.pyc'
  - '!**/*.pyo'
  - '!**/*.pyd'

# Extra resources to copy into the app
extraResources:
  - from: resources/
    to: .
    filter:
      - '**/*'
  # Spec 2026-07-06 §7: every installer carries the generated third-party
  # license/attribution compliance doc as a plain file (the About screen
  # renders the same content from the renderer bundle).
  - from: THIRD-PARTY-LICENSES.md
    to: THIRD-PARTY-LICENSES.md
  - from: backend/
    to: backend-source/
    filter:
      - '**/*'
      - '!venv/**/*'
      - '!build/**/*'
      - '!dist/**/*'
      - '!__pycache__/**/*'
      - '!*.pyc'
      # NEVER ship user-side state: provisioned model weights (multi-GB AND
      # unlicensed redistribution - weights install per-user through the
      # consent-gated Foundry), the local database, and generated outputs.
      # tests/packaging-config.test.ts pins these exclusions.
      - '!models/**/*'
      - '!data/**/*'
      - '!outputs/**/*'
      - '!.pytest_cache/**/*'

# =============================================================================
# Windows Configuration
# =============================================================================
win:
  # Target formats: NSIS *web* installer + portable ZIP.
  # nsis-web (not nsis): the app payload (~2.5 GB backend bundle) exceeds the
  # 32-bit makensis mmap ceiling, so a single-file NSIS installer physically
  # cannot build. The web stub is tiny; it pulls the .nsis.7z app package from
  # the R2 delivery host (appPackageUrl below) at install time - same
  # zero-egress host that serves the update feed.
  target:
    - target: nsis-web
      arch:
        - x64
    - target: zip
      arch:
        - x64

  # App icon
  icon: build/icon.ico

  # Publisher name (must match certificate subject)
  publisherName: Vision Studio Team

  # Verify code signature on updates. Release builds must be signed.
  verifyUpdateCodeSignature: true

  # Run as current user (admin not needed for normal operation)
  requestedExecutionLevel: asInvoker

  # Release signing is enforced by scripts/verify-release-signing.cjs.
  # Use `npm run package:win:signed` for production artifacts.
  # Local unsigned development packaging can still use `npm run package:win`.

# NSIS Installer Configuration (applies to the nsis-web target)
nsis:
  # Create desktop shortcut
  createDesktopShortcut: always
  # Create start menu shortcut
  createStartMenuShortcut: true
  # Allow users to change installation directory
  allowToChangeInstallationDirectory: true
  # One-click installer (set to false for per-machine/per-user choice)
  oneClick: false
  # Per-machine installation (requires admin)
  perMachine: true
  # Include custom NSIS hooks
  include: installer.nsh

# NSIS web-installer specifics: where the stub downloads the app package
# from. scripts/publish-r2.cjs uploads release/ artifacts (including the
# .nsis.7z, before latest.yml) to the win/ prefix behind this host.
# Hyphenated artifactName keeps the public download URL space-free.
nsisWeb:
  appPackageUrl: https://updates.vision-studio-x.com/win
  artifactName: 'Vision-Studio-${version}-Setup.${ext}'

# =============================================================================
# macOS Configuration
# =============================================================================
# Apple Silicon ONLY: PyTorch dropped macOS x64 wheels at 2.3, so an Intel
# backend bundle cannot be built - an x64 app would ship without its brain.
# Unsigned-but-runnable: with no Developer ID identity configured,
# electron-builder ad-hoc signs the bundle (mandatory for arm64 to launch at
# all); PyInstaller ad-hoc signs the backend binary the same way. Gatekeeper
# will require right-click-Open on first launch until real signing lands -
# same honest posture as the unsigned Windows build.
mac:
  category: public.app-category.graphics-design
  target:
    - target: dmg
      arch:
        - arm64
    # electron-updater on macOS consumes the zip (dmg is for humans); both
    # ride latest-mac.yml. Dormant until signed builds, like Windows.
    - target: zip
      arch:
        - arm64
  # 1024px PNG source; electron-builder derives the .icns at build time.
  icon: build/icon.png
  hardenedRuntime: false
  gatekeeperAssess: false
  artifactName: 'Vision-Studio-${version}-${arch}.${ext}'
  publish:
    provider: generic
    url: https://updates.vision-studio-x.com/mac/
    useMultipleRangeRequest: false

# =============================================================================
# Linux Configuration
# =============================================================================
# AppImage only: it is the one Linux format electron-updater can auto-update,
# it runs on every distro without a package manager, and the multi-GB payload
# makes per-distro deb/rpm variants pure storage cost with no delivery win.
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Graphics
  icon: build/icon.png
  maintainer: Vision Studio Team
  vendor: Vision Studio Team
  synopsis: AI Image & Video Generation
  description: Professional AI-powered image and video generation desktop application
  artifactName: 'Vision-Studio-${version}-${arch}.${ext}'
  publish:
    provider: generic
    url: https://updates.vision-studio-x.com/linux/
    useMultipleRangeRequest: false

# =============================================================================
# Auto-Update Feed (Cloudflare R2, generic provider)
# =============================================================================
# GitHub caps release assets at 2 GB - the heavy installer cannot ship there.
# Feed + installers are published to R2 (scripts/publish-r2.cjs, binaries
# first, feed last) behind the updates.vision-studio-x.com custom domain,
# one prefix per platform mirroring each platform's publish.url:
#   win/   latest.yml       (nsis-web stub + .nsis.7z + portable zip)
#   mac/   latest-mac.yml   (dmg + zip)
#   linux/ latest-linux.yml (AppImage)
# publish is declared PER-PLATFORM (win/mac/linux blocks) - a single
# top-level feed URL would point every platform at the Windows prefix.
# R2/S3 serve a single range per request, so multi-range differential
# downloads must be disabled or blockmap updates fail. Auto-update installs
# only signed builds (win.verifyUpdateCodeSignature) - see docs/R2-DELIVERY.md
# for the signing prerequisite before the feed goes live.
publish:
  provider: generic
  url: https://updates.vision-studio-x.com/win/
  useMultipleRangeRequest: false
