name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: "Skip E2E tests"
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-full:
    name: Full Test Suite
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: npm ci

      - name: Install backend test dependencies
        run: pip install -r backend/requirements.txt

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Frontend tests (unit + component + integration)
        run: npx vitest run --reporter=default --reporter=junit --outputFile=test-results/junit.xml

      - name: Backend tests (pytest)
        # See backend/pytest.ini. pytest runs both the unittest.TestCase suites
        # and the pytest-style tests; benchmarks are excluded by default.
        working-directory: backend
        run: python -m pytest -v

      - name: Build app
        run: npm run build

      - name: Install Playwright browsers
        if: ${{ !inputs.skip_e2e }}
        run: npx playwright install chromium

      - name: E2E tests
        if: ${{ !inputs.skip_e2e }}
        run: npx playwright test --reporter=list,junit --output=test-results/e2e
        env:
          VISION_STUDIO_SKIP_BACKEND: "1"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  build-windows:
    name: Build Windows
    needs: test-full
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      # `secrets` is not readable from step-level `if`; surface presence here.
      R2_SECRETS_PRESENT: ${{ secrets.R2_ACCESS_KEY_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify release signing credentials
        run: npm run release:signing:check
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_SUBJECT_NAME: ${{ secrets.WIN_CSC_SUBJECT_NAME }}
          WIN_CSC_SHA1: ${{ secrets.WIN_CSC_SHA1 }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_CLIENT_CERTIFICATE_PATH: ${{ secrets.AZURE_CLIENT_CERTIFICATE_PATH }}
          AZURE_USERNAME: ${{ secrets.AZURE_USERNAME }}
          AZURE_PASSWORD: ${{ secrets.AZURE_PASSWORD }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}

      - name: Package signed Windows release
        run: npm run package:win:signed
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_SUBJECT_NAME: ${{ secrets.WIN_CSC_SUBJECT_NAME }}
          WIN_CSC_SHA1: ${{ secrets.WIN_CSC_SHA1 }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_CLIENT_CERTIFICATE_PATH: ${{ secrets.AZURE_CLIENT_CERTIFICATE_PATH }}
          AZURE_USERNAME: ${{ secrets.AZURE_USERNAME }}
          AZURE_PASSWORD: ${{ secrets.AZURE_PASSWORD }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: vision-studio-windows-x64
          path: |
            release/*.exe
            release/*.zip
            release/*.yml
            release/*.blockmap
          retention-days: 90

      # #34 installer PR4: publish the update feed + installer to Cloudflare R2
      # (GitHub caps release assets at 2 GB - the heavy installer lives on R2).
      # Runs only on version tags AND only once the R2 secrets exist; binaries
      # upload first and latest.yml last (see scripts/publish-r2.cjs), so a
      # failed publish never flips clients to a missing installer.
      - name: Publish update feed to R2
        if: ${{ startsWith(github.ref, 'refs/tags/v') && env.R2_SECRETS_PRESENT == 'true' }}
        run: npm run release:publish:r2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}

  build-linux:
    name: Build Linux
    needs: test-full
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package for Linux
        run: npm run package:linux

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: vision-studio-linux
          path: |
            release/*.AppImage
            release/*.deb
          retention-days: 90

  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/vision-studio-windows-x64/*
            artifacts/vision-studio-linux/*
