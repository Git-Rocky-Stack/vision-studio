name: PR Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

  audit-prod:
    name: Dependency Audit (shipped)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Audit production (shipped) dependencies
        # Gates only the bundled app tree. Dev/build-time advisories are tracked,
        # documented exceptions in docs/dependency-security.md. A new advisory on
        # a shipped package fails this job and blocks the PR.
        run: npm run audit:prod

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Vitest (unit + component + integration)
        run: npx vitest run --reporter=default --reporter=junit --outputFile=test-results/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: test-results/junit.xml
          retention-days: 14

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend test dependencies
        # requirements.txt keeps the heavy CUDA stack (torch/diffusers) commented
        # out, so this installs only the lightweight server + test deps the unit
        # tests need (fastapi, pydantic, Pillow, numpy, pytest, ...). The services
        # import torch lazily inside try-blocks and run in stub mode without it.
        run: pip install -r backend/requirements.txt

      - name: Run backend tests (pytest)
        # pytest is a superset of the unittest suites and also collects the
        # pytest-style tests (fixtures/monkeypatch) that `unittest discover`
        # silently skipped. Config (testpaths, pythonpath, benchmark ignore)
        # lives in backend/pytest.ini. Runs the unit + integration tiers
        # (benchmarks are excluded by pytest.ini addopts).
        working-directory: backend
        run: python -m pytest -v --junitxml=test-results/backend-junit.xml

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results/backend-junit.xml
          retention-days: 14
