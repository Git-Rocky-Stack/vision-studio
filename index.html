<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vision Studio - AI Image & Video Generation</title>
    <meta name="description" content="Professional AI-powered image and video generation for content creators" />
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Prevent FOUC — colors match @theme --color-void tokens -->
    <style>
      :root { --fouc-bg: #050507; }
      :root[data-theme='light'] { --fouc-bg: #f2efe8; }
      html, body, #root {
        margin: 0;
        padding: 0;
        background-color: var(--fouc-bg);
      }
    </style>
    <script>
      // Apply persisted theme before first paint to avoid flash
      try {
        var s = JSON.parse(localStorage.getItem('vision-studio-storage') || '{}');
        var t = (s.state && s.state.theme) || 'dark';
        if (t === 'system') t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.dataset.theme = t;
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
