<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Keep this CSP in sync with electron/services/contentSecurityPolicy.ts
      (CONTENT_SECURITY_POLICY). The browser enforces the INTERSECTION of this
      meta policy and the Electron session-header policy, so img-src/media-src
      MUST allow the local backend origins + file: here too, or generated media
      previews are blocked even though the header allows them. The
      meta-matches-header consistency is locked by contentSecurityPolicy.test.ts.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: file: http://localhost:* http://127.0.0.1:*; connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*; media-src 'self' blob: file: http://localhost:* http://127.0.0.1:*" />
    <title>Vision Studio - AI Image & Video Generation</title>
    <meta name="description" content="Professional AI-powered image and video generation for content creators" />

    <!-- Fonts are bundled locally via @fontsource (src/fonts.ts), never a runtime
         CDN: Vision Studio is local-first/offline-capable and must not phone home to
         Google Fonts on launch. See DESIGN.md, Typography section. -->

    <!-- Prevent FOUC — colors match @theme --color-void tokens -->
    <style>
      :root { --fouc-bg: #050507; }
      :root[data-theme='light'] { --fouc-bg: #f2efe8; }
      html, body, #root {
        margin: 0;
        padding: 0;
        background-color: var(--fouc-bg);
      }
    </style>
    <script>
      // Apply persisted theme before first paint to avoid flash
      try {
        var s = JSON.parse(localStorage.getItem('vision-studio-storage') || '{}');
        var t = (s.state && s.state.theme) || 'dark';
        if (t === 'system') t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.dataset.theme = t;
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
