[pytest]
# Vision Studio backend test configuration.
# Run from the backend/ directory:  python -m pytest
#
# Why this file exists: many tests are pytest-style (fixtures, monkeypatch, plain
# `def test_*`) and are silently NOT collected by `python -m unittest discover`.
# CI now runs `python -m pytest`, which is a superset (it also runs the
# unittest.TestCase suites), so the pytest-only files - including the security
# sanitization and DB migration tests - actually execute.

# Only collect the backend test package (never recurse into venv/, models/, etc.).
testpaths = tests

# Add the backend root to sys.path so tests can `import main` / `from utils ...`
# without an externally-set PYTHONPATH (requires pytest >= 7).
pythonpath = .

# Benchmarks load real diffusion weights at import time: slow, and they
# crash the interpreter on machines without the GPU/model stack. Exclude them from
# default runs. Run them explicitly with:
#   python -m pytest tests/benchmarks -o addopts="" --benchmark-only
addopts = --ignore=tests/benchmarks

# Test tiers are applied automatically by file location in tests/conftest.py:
#   test_*_api.py    -> integration (FastAPI/HTTP boundary)
#   tests/benchmarks -> benchmark   (real model loading; the hardware tier)
#   everything else  -> unit        (fast isolated logic)
# Select a tier with -m, e.g. `python -m pytest -m unit` or `-m integration`.
markers =
    unit: fast isolated logic - schemas, services (stub mode), config, migrations (no HTTP, no real models)
    integration: exercises the FastAPI app / HTTP boundary via TestClient
    benchmark: real diffusion/model-loading test in tests/benchmarks/ (opt-in; the hardware tier)
